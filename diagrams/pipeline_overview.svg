<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="740" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Retail forecasting pipeline overview</title>
<desc>End-to-end pipeline from synthetic data generator through BigQuery curated layer to two parallel ML branches converging at the evaluation harness.</desc>
<defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif; }
.t { font-size: 14px; font-weight: 400; }
.ts { font-size: 12px; font-weight: 400; }
.th { font-size: 14px; font-weight: 500; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray .th, .c-gray .t { fill: #2C2C2A; }
.c-gray .ts { fill: #5F5E5A; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .th, .c-purple .t { fill: #26215C; }
.c-purple .ts { fill: #534AB7; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .th, .c-teal .t { fill: #04342C; }
.c-teal .ts { fill: #0F6E56; }
.c-coral rect { fill: #FAECE7; stroke: #993C1D; }
.c-coral .th, .c-coral .t { fill: #4A1B0C; }
.c-coral .ts { fill: #993C1D; }
.c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
.c-amber .th, .c-amber .t { fill: #412402; }
.c-amber .ts { fill: #854F0B; }
.c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
.c-green .th, .c-green .t { fill: #173404; }
.c-green .ts { fill: #3B6D11; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
.label-neutral { fill: #5F5E5A; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<g class="c-gray">
<rect x="220" y="30" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Synthetic data generator</text>
<text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">Python, multiplicative model</text>
</g>
<line x1="340" y1="86" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="220" y="120" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Cloud Storage (raw)</text>
<text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">CMEK, Parquet</text>
</g>
<line x1="340" y1="176" x2="340" y2="210" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="160" y="210" width="360" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central">BigQuery — curated layer</text>
<text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">curated.fact_sales_daily</text>
<text class="ts" x="340" y="266" text-anchor="middle" dominant-baseline="central">Partitioned, clustered</text>
</g>
<line x1="280" y1="278" x2="160" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="278" x2="520" y2="330" class="arr" marker-end="url(#arrow)"/>
<text class="ts label-neutral" x="190" y="305" text-anchor="middle">Top 200 SKUs</text>
<text class="ts label-neutral" x="490" y="305" text-anchor="middle">Top 100 × Top 30</text>
<g class="c-teal">
<rect x="40" y="330" width="240" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="160" y="352" text-anchor="middle" dominant-baseline="central">BQML ARIMA_PLUS</text>
<text class="ts" x="160" y="370" text-anchor="middle" dominant-baseline="central">15,000 series, univariate</text>
<text class="ts" x="160" y="386" text-anchor="middle" dominant-baseline="central">BigQuery-native training</text>
</g>
<g class="c-coral">
<rect x="400" y="330" width="240" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="352" text-anchor="middle" dominant-baseline="central">Vertex AI Forecast (TFT)</text>
<text class="ts" x="520" y="370" text-anchor="middle" dominant-baseline="central">3,000 series, 14 covariates</text>
<text class="ts" x="520" y="386" text-anchor="middle" dominant-baseline="central">AutoML architecture search</text>
</g>
<line x1="160" y1="398" x2="160" y2="440" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="398" x2="520" y2="440" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="40" y="440" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="160" y="460" text-anchor="middle" dominant-baseline="central">forecast.arima_top200_h28</text>
<text class="ts" x="160" y="478" text-anchor="middle" dominant-baseline="central">Predictions table</text>
</g>
<g class="c-coral">
<rect x="400" y="440" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="460" text-anchor="middle" dominant-baseline="central">forecast.predictions</text>
<text class="ts" x="520" y="478" text-anchor="middle" dominant-baseline="central">Predictions table</text>
</g>
<line x1="160" y1="496" x2="280" y2="560" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="496" x2="400" y2="560" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber">
<rect x="160" y="560" width="360" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="582" text-anchor="middle" dominant-baseline="central">Evaluation harness (BigQuery SQL)</text>
<text class="ts" x="340" y="600" text-anchor="middle" dominant-baseline="central">Same 2,820 series, same 28-day window</text>
<text class="ts" x="340" y="616" text-anchor="middle" dominant-baseline="central">Weighted MAPE per category and overall</text>
</g>
<line x1="340" y1="628" x2="340" y2="662" class="arr" marker-end="url(#arrow)"/>
<g class="c-green">
<rect x="180" y="662" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="682" text-anchor="middle" dominant-baseline="central">ARIMA 30.08% → TFT 16.92%</text>
<text class="ts" x="340" y="700" text-anchor="middle" dominant-baseline="central">44% relative MAPE reduction</text>
</g>
</svg>
