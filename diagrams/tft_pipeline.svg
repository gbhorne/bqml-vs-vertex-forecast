<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="700" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Vertex AI TFT pipeline detail</title>
<desc>Detailed view of the Vertex AI Forecast pipeline: top-100 × top-30 selection through batch inference output.</desc>
<defs>
<style>
